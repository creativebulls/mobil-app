<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification link expired — WhereAbout</title>
</head>
<body style="margin:0;padding:0;background-color:#FAF5FC;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#FAF5FC;padding:32px 16px;min-height:100vh;">
    <tr>
      <td align="center" valign="middle">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(45,26,53,0.08);">
          <tr>
            <td style="height:6px;background:linear-gradient(90deg,#9447B3 0%,#F36464 100%);"></td>
          </tr>
          <tr>
            <td style="padding:40px 32px;text-align:center;">
              <div style="display:inline-block;width:72px;height:72px;border-radius:36px;background:#F2F2F2;line-height:72px;font-size:34px;color:#F36464;">!</div>
              <h1 style="margin:24px 0 12px;font-size:26px;line-height:1.3;color:#2D1A35;font-weight:800;">Link expired or already used</h1>
              <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#7A6288;">This verification link is no longer valid. If you already verified your email, return to the WhereAbout app and tap <strong>Continue</strong>.</p>
              <a href="{{deepLinkUrl}}" style="display:inline-block;background:#F36464;color:#FFFFFF;text-decoration:none;font-size:16px;font-weight:700;padding:16px 28px;border-radius:8px;">Open WhereAbout</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
