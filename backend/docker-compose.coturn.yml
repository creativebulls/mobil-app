# TURN relay for WebRTC voice/group calls.
#
# WHY: STUN alone cannot connect calls across most mobile/cellular networks
# (carrier-grade / symmetric NAT). A TURN server relays the encrypted media so
# calls connect reliably everywhere. There is no longer a working free public
# TURN, so you must run your own — this file does that in one command.
#
# RUN THIS ON YOUR PUBLIC SERVER (e.g. mobilevps.tech), not on your laptop:
#   1. Edit the two CHANGE_ME values below (EXTERNAL_IP + the shared secret).
#   2. Open firewall ports: 3478/udp, 3478/tcp, and 49152-49200/udp.
#   3. docker compose -f docker-compose.coturn.yml up -d
#   4. In backend/.env set:
#        TURN_URLS=turn:mobilevps.tech:3478?transport=udp,turn:mobilevps.tech:3478?transport=tcp
#        TURN_USERNAME=whereabout
#        TURN_CREDENTIAL=CHANGE_ME_STRONG_SECRET
#      then restart the backend.
#
# Host networking is required so the relay's UDP ports are directly reachable.
services:
  coturn:
    image: coturn/coturn:latest
    container_name: whereabout-coturn
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --realm=mobilevps.tech
      - --user=whereabout:CHANGE_ME_STRONG_SECRET
      - --external-ip=CHANGE_ME_SERVER_PUBLIC_IP
      - --min-port=49152
      - --max-port=49200
      - --no-cli
      - --log-file=stdout
